<!DOCTYPE html>
<html>
<head>
  <title>Product Dashboard</title>
  <style>
    body {
      font-family: Arial;
      background: #f5f5f5;
      text-align: center;
    }

    h1 {
      margin: 20px;
    }

    #products {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 20px;
      padding: 20px;
    }

    .card {
      background: white;
      padding: 15px;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }
  </style>
</head>
<body>

<h1>📦 Product Dashboard</h1>
<div id="products"></div>

<script>
fetch("http://localhost:3000/products")
  .then(res => res.json())
  .then(data => {
    const container = document.getElementById("products");

    data.forEach(item => {
      const div = document.createElement("div");
      div.className = "card";
      div.innerHTML = `<h3>${item.title}</h3><p>${item.price}</p>`;
      container.appendChild(div);
    });
  });
</script>

</body>
</html>
